<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ホームページ制作 ヒアリングシート | 3e design</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <h1>ホームページ制作 ヒアリングシート</h1>
    </div>
  </header>

  <main class="container">
    <form id="hearing-form" autocomplete="off">

      <!-- 1. 基本情報 -->
      <section class="form-section">
        <h2 class="section-title">基本情報</h2>
        <div class="field">
          <label for="company">会社名・屋号・店名</label>
          <textarea id="company" name="company"></textarea>
        </div>
        <div class="field">
          <label for="contact">担当者名</label>
          <textarea id="contact" name="contact"></textarea>
        </div>
        <div class="field">
          <label for="business">業種・事業内容</label>
          <textarea id="business" name="business"></textarea>
        </div>
        <div class="field field--short">
          <label for="meeting_date">対面日</label>
          <input type="date" id="meeting_date" name="meeting_date">
        </div>
      </section>

      <!-- 2. 制作の目的 -->
      <section class="form-section">
        <h2 class="section-title">制作の目的</h2>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="purpose" value="new">
            <span>新規制作</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="purpose" value="renewal">
            <span>リニューアル</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="purpose" value="other">
            <span>その他</span>
          </label>
        </div>

        <div id="purpose-other-field" class="sub-section hidden">
          <div class="field">
            <label>具体的な内容</label>
            <textarea name="purpose_other" placeholder="制作の目的を具体的にお聞かせください"></textarea>
          </div>
        </div>

        <div id="renewal-fields" class="sub-section hidden">
          <div class="field">
            <label for="existing_url">既存サイトURL</label>
            <textarea id="existing_url" name="existing_url"></textarea>
          </div>
          <div class="field">
            <label for="carry_over">引き継ぐコンテンツ</label>
            <textarea id="carry_over" name="carry_over" placeholder="例：テキスト・画像・ブログ記事など"></textarea>
          </div>
        </div>
      </section>

      <!-- 3. サイトの種類 -->
      <section class="form-section">
        <h2 class="section-title">サイトの種類</h2>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="site_type" value="corporate">
            <span>コーポレートサイト</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="site_type" value="lp">
            <span>LP（ランディングページ）</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="site_type" value="recruit">
            <span>採用サイト</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="site_type" value="ec">
            <span>ECサイト</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="site_type" value="other">
            <span>その他</span>
          </label>
        </div>

        <div id="site-type-other-field" class="sub-section hidden">
          <div class="field">
            <label>具体的な内容</label>
            <textarea name="site_type_other"></textarea>
          </div>
        </div>

        <div id="ec-fields" class="sub-section hidden">
          <div class="field">
            <label>ECプラットフォーム</label>
            <div class="radio-group">
              <label class="radio-label">
                <input type="radio" name="ec_platform" value="custom">
                <span>独自システム</span>
              </label>
              <label class="radio-label">
                <input type="radio" name="ec_platform" value="base">
                <span>BASE</span>
              </label>
              <label class="radio-label">
                <input type="radio" name="ec_platform" value="shopify">
                <span>Shopify</span>
              </label>
              <label class="radio-label">
                <input type="radio" name="ec_platform" value="coloreme">
                <span>カラーミーショップ</span>
              </label>
              <label class="radio-label">
                <input type="radio" name="ec_platform" value="other">
                <span>その他</span>
              </label>
            </div>
          </div>
          <div id="ec-platform-other-field" class="sub-section hidden">
            <div class="field">
              <label>その他のプラットフォーム</label>
              <textarea name="ec_platform_other"></textarea>
            </div>
          </div>
        </div>
      </section>

      <!-- 4. ページ構成 -->
      <section class="form-section" id="section-page-structure">
        <h2 class="section-title">ページ構成</h2>
        <div class="field">
          <label>必要なページ</label>
          <div class="checkbox-group">
            <label class="checkbox-label">
              <input type="checkbox" name="pages" value="top">
              <span>トップ</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="pages" value="about">
              <span>会社概要</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="pages" value="service">
              <span>サービス・事業内容</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="pages" value="price">
              <span>料金・プラン</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="pages" value="contact">
              <span>お問い合わせ</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="pages" value="blog">
              <span>ブログ・お知らせ</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="pages" value="recruit">
              <span>採用</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="pages" value="shop">
              <span>ショップ</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" name="pages" value="other" id="page-other">
              <span>その他</span>
            </label>
          </div>
          <div id="page-other-field" class="sub-section hidden">
            <div class="field">
              <label>その他のページ</label>
              <textarea name="pages_other_text"></textarea>
            </div>
          </div>
        </div>
      </section>

      <!-- 5. 機能要件 -->
      <section class="form-section" id="section-features">
        <h2 class="section-title">機能要件</h2>
        <div class="checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" name="features" value="contact_form">
            <span>お問い合わせフォーム</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" name="features" value="reservation">
            <span>予約フォーム</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" name="features" value="cart">
            <span>ショッピングカート</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" name="features" value="member">
            <span>会員登録</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" name="features" value="blog">
            <span>ブログ・更新機能</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" name="features" value="sns">
            <span>SNS連携</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" name="features" value="map">
            <span>Google Map埋め込み</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" name="features" value="other" id="feature-other">
            <span>その他</span>
          </label>
        </div>
        <div id="feature-other-field" class="sub-section hidden">
          <div class="field">
            <label>その他の機能</label>
            <textarea name="features_other_text"></textarea>
          </div>
        </div>
      </section>

      <!-- 6. CMS・更新 -->
      <section class="form-section" id="section-cms">
        <h2 class="section-title">CMS・更新</h2>
        <div class="field">
          <label>CMS</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="cms" value="wordpress">
              <span>WordPress</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="cms" value="any">
              <span>なんでもよい</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="cms" value="none">
              <span>不要</span>
            </label>
          </div>
        </div>
        <div class="field">
          <label>自分で更新するか</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="self_update" value="yes">
              <span>する</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="self_update" value="no">
              <span>しない</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="self_update" value="considering">
              <span>検討中</span>
            </label>
          </div>
        </div>
      </section>

      <!-- 7. ドメイン・サーバー -->
      <section class="form-section">
        <h2 class="section-title">ドメイン・サーバー</h2>
        <div class="field">
          <label>ドメイン</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="domain" value="has_domain">
              <span>すでにある</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="domain" value="new_domain">
              <span>これから取得する</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="domain" value="any_domain">
              <span>なんでもよい</span>
            </label>
          </div>
          <div id="domain-exist-fields" class="sub-section hidden">
            <div class="field">
              <label>管理会社</label>
              <div class="radio-group">
                <label class="radio-label">
                  <input type="radio" name="domain_registrar" value="muumuu">
                  <span>ムームードメイン</span>
                </label>
                <label class="radio-label">
                  <input type="radio" name="domain_registrar" value="onamae">
                  <span>お名前.com</span>
                </label>
                <label class="radio-label">
                  <input type="radio" name="domain_registrar" value="xserver">
                  <span>Xserver</span>
                </label>
                <label class="radio-label">
                  <input type="radio" name="domain_registrar" value="google">
                  <span>Google Domains</span>
                </label>
                <label class="radio-label">
                  <input type="radio" name="domain_registrar" value="other">
                  <span>その他</span>
                </label>
              </div>
            </div>
            <div class="field">
              <label class="checkbox-label">
                <input type="checkbox" name="domain_transfer">
                <span>ドメイン移管希望</span>
              </label>
            </div>
          </div>
        </div>
        <div class="field">
          <label>サーバー</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="server" value="has_server">
              <span>すでにある</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="server" value="new_server">
              <span>これから契約する</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="server" value="any_server">
              <span>なんでもよい</span>
            </label>
          </div>
          <div id="server-exist-fields" class="sub-section hidden">
            <div class="field">
              <label>サーバー会社</label>
              <div class="radio-group">
                <label class="radio-label">
                  <input type="radio" name="server_company" value="lolipop">
                  <span>ロリポップ</span>
                </label>
                <label class="radio-label">
                  <input type="radio" name="server_company" value="sakura">
                  <span>さくらインターネット</span>
                </label>
                <label class="radio-label">
                  <input type="radio" name="server_company" value="xserver">
                  <span>Xserver</span>
                </label>
                <label class="radio-label">
                  <input type="radio" name="server_company" value="conoha">
                  <span>ConoHa</span>
                </label>
                <label class="radio-label">
                  <input type="radio" name="server_company" value="other">
                  <span>その他</span>
                </label>
              </div>
            </div>
            <div class="field">
              <label class="checkbox-label">
                <input type="checkbox" name="server_transfer">
                <span>サーバー移管希望</span>
              </label>
            </div>
          </div>
        </div>
      </section>

      <!-- 8. ブランドカラー -->
      <section class="form-section">
        <h2 class="section-title">ブランドカラー</h2>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="brand_color" value="has_color">
            <span>すでに使っている色がある</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="brand_color" value="no_color">
            <span>まだ決まっていない</span>
          </label>
        </div>

        <div id="color-picker-fields" class="sub-section hidden">
          <div class="field">
            <div class="color-picker-row">
              <div class="color-picker-item">
                <label for="color_main">メインカラー</label>
                <div class="color-input-group">
                  <input type="color" id="color_main" name="color_main" value="#cccccc">
                  <button type="button" class="color-swatch-btn no-print" aria-label="スウォッチから選ぶ"></button>
                  <input type="text" id="code_main" name="code_main" class="color-code-input" value="#CCCCCC" placeholder="#000000" maxlength="7" spellcheck="false">
                </div>
              </div>
              <div class="color-picker-item">
                <label for="color_sub">サブカラー</label>
                <div class="color-input-group">
                  <input type="color" id="color_sub" name="color_sub" value="#cccccc">
                  <button type="button" class="color-swatch-btn no-print" aria-label="スウォッチから選ぶ"></button>
                  <input type="text" id="code_sub" name="code_sub" class="color-code-input" value="#CCCCCC" placeholder="#000000" maxlength="7" spellcheck="false">
                </div>
              </div>
              <div class="color-picker-item">
                <label for="color_accent">アクセントカラー</label>
                <div class="color-input-group">
                  <input type="color" id="color_accent" name="color_accent" value="#cccccc">
                  <button type="button" class="color-swatch-btn no-print" aria-label="スウォッチから選ぶ"></button>
                  <input type="text" id="code_accent" name="code_accent" class="color-code-input" value="#CCCCCC" placeholder="#000000" maxlength="7" spellcheck="false">
                </div>
              </div>
            </div>
          </div>
          <div class="field">
            <label for="color_note">補足テキスト</label>
            <textarea id="color_note" name="color_note" placeholder="例：Webで使っているカラーコードなど"></textarea>
          </div>
        </div>

        <div id="color-preference-fields" class="sub-section hidden">
          <div class="field">
            <label for="color_image">好みの色のイメージ</label>
            <textarea id="color_image" name="color_image" placeholder="例：暖色系、落ち着いた色など"></textarea>
          </div>
          <div class="field">
            <label for="color_avoid">避けたい色</label>
            <textarea id="color_avoid" name="color_avoid"></textarea>
          </div>
        </div>
      </section>

      <!-- 9. デザインの方向性 -->
      <section class="form-section">
        <h2 class="section-title">デザインの方向性</h2>
        <div class="field">
          <label for="image_words">イメージワード</label>
          <textarea id="image_words" name="image_words" placeholder="例：シンプル、信頼感、やわらかい"></textarea>
        </div>
        <div class="field">
          <label for="reference">参考にしたいサイト・雰囲気（URL・フリーテキスト）</label>
          <textarea id="reference" name="reference"></textarea>
        </div>
        <div class="field">
          <label for="competitor">競合・同業他社のサイト（似てほしくない基準として）</label>
          <textarea id="competitor" name="competitor"></textarea>
        </div>
        <div class="field">
          <label for="avoid_design">避けたいデザインの傾向</label>
          <textarea id="avoid_design" name="avoid_design"></textarea>
        </div>
      </section>

      <!-- 10. ターゲット・想い -->
      <section class="form-section">
        <h2 class="section-title">ターゲット・想い</h2>
        <div class="field">
          <label for="target">誰に届けたいか</label>
          <textarea id="target" name="target"></textarea>
        </div>
        <div class="field">
          <label for="impression">サイトを見た人にどう感じてほしいか</label>
          <textarea id="impression" name="impression" placeholder="例：信頼感、親しみやすさ、高級感"></textarea>
        </div>
        <div class="field">
          <label for="values">大切にしていること・伝えたいこと</label>
          <textarea id="values" name="values"></textarea>
        </div>
        <div class="field">
          <label for="meaning">サイトに込めたい意味やこだわり</label>
          <textarea id="meaning" name="meaning"></textarea>
        </div>
      </section>

      <!-- 11. 納期の希望 -->
      <section class="form-section">
        <h2 class="section-title">納期の希望</h2>
        <div class="field field--short">
          <label for="deadline_date">希望日</label>
          <input type="date" id="deadline_date" name="deadline_date">
        </div>
        <div class="field">
          <label for="deadline_note">補足・備考</label>
          <textarea id="deadline_note" name="deadline_note" placeholder="例：〇月中、急ぎ、相談したい　など"></textarea>
        </div>
      </section>

      <!-- 12. 予算の目安 -->
      <section class="form-section">
        <h2 class="section-title">予算の目安</h2>
        <div class="field">
          <textarea name="budget" placeholder="例：30〜50万円、要相談　など"></textarea>
        </div>
      </section>

      <!-- 13. 支払い -->
      <section class="form-section">
        <h2 class="section-title">支払い</h2>
        <div class="field">
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="payment" value="before_start">
              <span>着手前</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="payment" value="half_half">
              <span>着手半金・納品時半金</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="payment" value="on_delivery">
              <span>納品時</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="payment" value="consult">
              <span>要相談</span>
            </label>
          </div>
          <div id="payment-consult-field" class="sub-section hidden">
            <div class="field">
              <textarea name="payment_note" placeholder="詳細をご記入ください"></textarea>
            </div>
          </div>
        </div>
      </section>

      <!-- 14. その他・備考 -->
      <section class="form-section">
        <h2 class="section-title">その他・備考</h2>
        <div class="field">
          <textarea name="notes"></textarea>
        </div>
      </section>

    </form>

    <div class="print-action no-print">
      <button type="button" id="pdf-btn" onclick="window.print()">PDFで保存する</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
